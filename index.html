<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enfants du Lynx</title>

<style>
body {
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Courier New", monospace;
  background:linear-gradient(#0b0f0c,#151b17);
  color:#e6f2e6;
}

.card{
  max-width:700px;
  padding:30px;
  border:2px solid #4e7c59;
  border-radius:16px;
  background:#162018;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
  color:#7bd88f;
  letter-spacing:2px;
}

.mission{
  margin-top:20px;
  padding:15px;
  background:#1f2a22;
  border-radius:12px;
  line-height:1.7;
}

.coords{
  margin-top:20px;
  font-size:26px;
  font-weight:bold;
  color:#b8ffcb;
}

.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.6;
}
</style>

</head>

<body>

<div class="card">
  <h1>ENFANTS</h1>

  <div class="mission">
    Vous êtes les éclaireurs du Lynx.<br><br>
    Avancez discrètement.<br>
    Utilisez le terrain pour rester invisibles.
  </div>

  <div class="coords">
    N 47° 34.646'<br>
    E 003° 38.412'
  </div>

  <div class="mission">
    Cachez-vous dans le chemin.<br>
    Observez sans vous faire repérer.<br>
    Attendez le bon moment.
  </div>

  <div class="footer">
    Le Lynx vous observe.
  </div>
</div>

</body>
</html>
