<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Résistants</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: "Courier New", monospace;
      color: #f2e6ca;
      background:
        radial-gradient(circle at top, rgba(120, 90, 40, 0.22), transparent 30%),
        linear-gradient(180deg, #0d0d0d 0%, #15110d 100%);
    }

    .card {
      width: 100%;
      max-width: 760px;
      background:
        linear-gradient(rgba(30, 24, 18, 0.96), rgba(20, 16, 12, 0.97)),
        #1b1b1b;
      border: 2px solid #7b5d31;
      border-radius: 18px;
      padding: 30px 24px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 20px 50px rgba(0,0,0,0.6),
        0 0 24px rgba(123, 93, 49, 0.2);
      text-align: center;
    }

    .topline {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b79966;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .symbol {
      font-size: 34px;
      color: #b79966;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 3px;
      color: #75b6ff;
      text-transform: uppercase;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .mission-box {
      margin-top: 22px;
      padding: 20px;
      border-radius: 14px;
      background: #241f19;
      border: 1px solid rgba(183, 154, 101, 0.22);
      line-height: 1.8;
      font-size: 17px;
    }

    .coords-box {
      margin-top: 22px;
      padding: 22px;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(24, 41, 58, 0.35), rgba(20, 20, 20, 0.25));
      border: 1px solid rgba(117, 182, 255, 0.25);
      box-shadow: 0 0 16px rgba(117, 182, 255, 0.08);
    }

    .coords-title {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9ecaff;
      margin-bottom: 14px;
    }

    .coord {
      font-size: 30px;
      font-weight: bold;
      color: #ffffff;
      line-height: 1.5;
      letter-spacing: 1px;
    }

    .final-order {
      margin-top: 22px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(117, 182, 255, 0.08);
      border: 1px solid rgba(117, 182, 255, 0.18);
      color: #dceb
